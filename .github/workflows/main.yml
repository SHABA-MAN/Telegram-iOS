name: Build Telegram IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Clean Configuration (The Ultimate Fix)
        run: |
          # 1. مسح الأيقونات لتخطي خطأ إصدار Xcode
          find . -name "*.icon" -type d -exec rm -rf {} +
          find . -name "*.icon" -type f -exec rm -f {} +
          echo "common --incompatible_disallow_empty_glob=false" >> .bazelrc
          
          # 2. الحل السحري: تفريغ الشهادات من ملف الإعدادات الأصلي باستخدام بايثون لضمان عدم كسر الكود
          python3 -c '
          import json
          path = "build-system/appstore-configuration.json"
          try:
              with open(path, "r") as f:
                  data = json.load(f)
              
              # مسح التيم آي دي والشهادات والتصاريح تماماً
              data["teamId"] = ""
              if "provisioningProfiles" in data:
                  data["provisioningProfiles"] = {}
              if "entitlements" in data:
                  data["entitlements"] = {}
                  
              with open(path, "w") as f:
                  json.dump(data, f, indent=4)
              print("✅ تم تفريغ الشهادات من ملف الإعدادات بنجاح!")
          except Exception as e:
              print("Error:", e)
          '

      - name: Inject CFBundleIcons into Plists
        run: |
          python3 -c '
          import plistlib, os
          for root, dirs, files in os.walk("."):
              for file in files:
                  if file.endswith(".plist"):
                      path = os.path.join(root, file)
                      try:
                          with open(path, "rb") as f:
                              p = plistlib.load(f)
                          if isinstance(p, dict):
                              p["CFBundleIcons"] = {"CFBundlePrimaryIcon": {"CFBundleIconFiles": ["AppIcon"]}}
                              with open(path, "wb") as f:
                                  plistlib.dump(p, f, fmt=plistlib.FMT_XML)
                      except: pass
          '

      - name: Generate Project Files
        run: python3 build-system/Make/Make.py generateProject --configurationPath build-system/appstore-configuration.json --disableProvisioningProfiles --disableExtensions --xcodeManagedCodesigning

      - name: Build Telegram
        run: |
          xcodebuild -project Telegram/Telegram.xcodeproj -scheme Telegram -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" ENTITLEMENTS_REQUIRED=NO CONFIGURATION_BUILD_DIR=${PWD}/build build

      - name: Package to IPA
        run: |
          mkdir -p Payload
          cp -R build/Telegram.app Payload/
          zip -r Telegram-NoSearch.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-Custom
          path: Telegram-NoSearch.ipa
