name: Build Telegram IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Hard Patch Source Code (Fix iOS 26 Errors)
        run: |
          find . -name "*.icon" -type d -exec rm -rf {} +
          find . -name "*.icon" -type f -exec rm -f {} +
          echo "common --incompatible_disallow_empty_glob=false" >> .bazelrc
          
          find . -name "*.swift" -exec sed -i '' '/func preferredWindowingControlStyle/,/}/d' {} +
          find . -name "*.swift" -exec sed -i '' 's/@available(iOS 26.0, \*)/@available(iOS 11.0, \*)/g' {} +

          python3 -c '
          import json, os
          path = "build-system/appstore-configuration.json"
          if os.path.exists(path):
              with open(path, "r") as f: data = json.load(f)
              data["teamId"] = ""
              data["provisioningProfiles"] = {}
              data["entitlements"] = {}
              with open(path, "w") as f: json.dump(data, f, indent=4)
          '

      - name: Inject CFBundleIcons into Plists
        run: |
          python3 -c '
          import plistlib, os
          for root, dirs, files in os.walk("."):
              for file in files:
                  if file.endswith(".plist"):
                      path = os.path.join(root, file)
                      try:
                          with open(path, "rb") as f: p = plistlib.load(f)
                          if isinstance(p, dict):
                              if "CFBundleIcons" not in p: p["CFBundleIcons"] = {}
                              if "CFBundlePrimaryIcon" not in p["CFBundleIcons"]: p["CFBundleIcons"]["CFBundlePrimaryIcon"] = {"CFBundleIconFiles": ["AppIcon"], "UIPrerenderedIcon": False}
                              if "CFBundleAlternateIcons" not in p["CFBundleIcons"]: p["CFBundleIcons"]["CFBundleAlternateIcons"] = {}
                              with open(path, "wb") as f: plistlib.dump(p, f, fmt=plistlib.FMT_XML)
                      except: pass
          '

      - name: Monkey-Patch Telegram Python Scripts
        run: |
          # الخطوة العبقرية: تعديل سكريبتات تليجرام لعدم الانهيار عند اختفاء الأيقونات
          python3 -c '
          import os
          for root, dirs, files in os.walk("."):
              for f in files:
                  if f.endswith(".py"):
                      path = os.path.join(root, f)
                      try:
                          with open(path, "r") as file: content = file.read()
                          if "CFBundleIcons" in content:
                              # استبدال القراءة المباشرة بقراءة آمنة تصنع الملف لو غير موجود
                              patch1 = ".setdefault(\"CFBundleIcons\", {\"CFBundlePrimaryIcon\": {\"CFBundleIconFiles\": [\"AppIcon\"], \"UIPrerenderedIcon\": False}, \"CFBundleAlternateIcons\": {}})"
                              patch2 = ".setdefault(\"CFBundleIcons\", {\"CFBundlePrimaryIcon\": {\"CFBundleIconFiles\": [\"AppIcon\"], \"UIPrerenderedIcon\": False}, \"CFBundleAlternateIcons\": {}})"
                              content = content.replace("[\"CFBundleIcons\"]", patch1)
                              content = content.replace("[\"CFBundleIcons\"]", patch2)
                              content = content.replace("[\"CFBundleIcons\"]", patch1)
                              with open(path, "w") as file: file.write(content)
                      except: pass
          '

      - name: Generate Project Files
        run: python3 build-system/Make/Make.py generateProject --configurationPath build-system/appstore-configuration.json --disableProvisioningProfiles --disableExtensions --xcodeManagedCodesigning

      - name: Build Telegram
        run: |
          xcodebuild -project Telegram/Telegram.xcodeproj -scheme Telegram -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" ENTITLEMENTS_REQUIRED=NO CONFIGURATION_BUILD_DIR=${PWD}/build build

      - name: Package to IPA
        run: |
          mkdir -p Payload
          cp -R build/Telegram.app Payload/
          zip -r Telegram-NoSearch.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-Custom-IPA
          path: Telegram-NoSearch.ipa
