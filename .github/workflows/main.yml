name: Build Telegram IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Clean and Hack Files
        run: |
          # مسح الأيقونات غير المدعومة
          find . -name "*.icon" -type d -exec rm -rf {} +
          find . -name "*.icon" -type f -exec rm -f {} +
          echo "common --incompatible_disallow_empty_glob=false" >> .bazelrc
          
          # إزالة الشهادة الرسمية المحفورة في كود تليجرام بخدعة برمجية
          sed -i '' 's/"iOS Team Provisioning Profile: ph.telegra.Telegraph"/None/g' Telegram/BUILD

      - name: Inject CFBundleIcons into Plists
        run: |
          python3 -c '
          import plistlib, os
          for root, dirs, files in os.walk("."):
              for file in files:
                  if file.endswith(".plist"):
                      path = os.path.join(root, file)
                      try:
                          with open(path, "rb") as f:
                              p = plistlib.load(f)
                          if isinstance(p, dict):
                              p["CFBundleIcons"] = {"CFBundlePrimaryIcon": {"CFBundleIconFiles": ["AppIcon"]}}
                              with open(path, "wb") as f:
                                  plistlib.dump(p, f, fmt=plistlib.FMT_XML)
                      except: pass
          '

      - name: Generate Project Files
        run: python3 build-system/Make/Make.py generateProject --configurationPath build-system/appstore-configuration.json --disableProvisioningProfiles --disableExtensions --xcodeManagedCodesigning

      - name: Build Telegram
        run: |
          xcodebuild -project Telegram/Telegram.xcodeproj -scheme Telegram -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO ENTITLEMENTS_REQUIRED=NO CONFIGURATION_BUILD_DIR=${PWD}/build build

      - name: Package to IPA
        run: |
          mkdir -p Payload
          cp -R build/Telegram.app Payload/
          zip -r Telegram-NoSearch.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-Custom
          path: Telegram-NoSearch.ipa
