name: Build Telegram IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Ultimate Project Patching
        run: |
          # 1. تنظيف الأيقونات
          find . -name "*.icon" -type d -exec rm -rf {} +
          find . -name "*.icon" -type f -exec rm -f {} +
          echo "common --incompatible_disallow_empty_glob=false" >> .bazelrc
          
          # 2. تصليح أكواد السويفت (iOS 26)
          find . -name "*.swift" -exec sed -i '' '/func preferredWindowingControlStyle/,/}/d' {} +
          find . -name "*.swift" -exec sed -i '' 's/@available(iOS 26.0, \*)/@available(iOS 11.0, \*)/g' {} +

          # 3. الضربة القاضية للشهادات: مسح أي ذكر لاسم شهادة تليجرام في أي ملف BUILD أو .bzl
          find . \( -name "BUILD" -o -name "*.bzl" \) -exec sed -i '' 's/"iOS Team Provisioning Profile: ph.telegra.Telegraph"/""/g' {} +
          find . \( -name "BUILD" -o -name "*.bzl" \) -exec sed -i '' 's/provisioning_profile = [^,]*)/provisioning_profile = None)/g' {} +

          # 4. تفريغ ملف الإعدادات تماماً
          python3 -c '
          import json, os
          path = "build-system/appstore-configuration.json"
          if os.path.exists(path):
              with open(path, "r") as f: data = json.load(f)
              data["teamId"] = ""
              data["provisioningProfiles"] = {}
              data["entitlements"] = {}
              with open(path, "w") as f: json.dump(data, f, indent=4)
          '

      - name: Inject CFBundleIcons (Safe Mode)
        run: |
          python3 -c '
          import plistlib, os
          for root, dirs, files in os.walk("."):
              for file in files:
                  if file.endswith(".plist"):
                      path = os.path.join(root, file)
                      try:
                          with open(path, "rb") as f: p = plistlib.load(f)
                          if isinstance(p, dict):
                              p["CFBundleIcons"] = {"CFBundlePrimaryIcon": {"CFBundleIconFiles": ["AppIcon"], "UIPrerenderedIcon": False}, "CFBundleAlternateIcons": {}}
                              with open(path, "wb") as f: plistlib.dump(p, f, fmt=plistlib.FMT_XML)
                      except: pass
          '

      - name: Generate Project Files
        run: python3 build-system/Make/Make.py generateProject --configurationPath build-system/appstore-configuration.json --disableProvisioningProfiles --disableExtensions --xcodeManagedCodesigning

      - name: Build Telegram
        run: |
          # بناء التطبيق مع فرض عدم التوقيع في كل مرحلة
          xcodebuild -project Telegram/Telegram.xcodeproj -scheme Telegram -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" ENTITLEMENTS_REQUIRED=NO CONFIGURATION_BUILD_DIR=${PWD}/build build

      - name: Package to IPA
        run: |
          mkdir -p Payload
          cp -R build/Telegram.app Payload/
          zip -r Telegram-NoSearch.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-Final-IPA
          path: Telegram-NoSearch.ipa
