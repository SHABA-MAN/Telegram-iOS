name: Build Telegram IPA

on:
  workflow_dispatch: # هذا السطر يضيف زر لتشغيل البناء يدوياً متى شئت

jobs:
  build:
    runs-on: macos-latest # استخدام أحدث جهاز ماك سحابي

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # خطوة حتمية لتحميل كل أجزاء تليجرام

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Remove Unsupported Icons
        run: |
          find . -name "*.icon" -type d -exec rm -rf {} +
          find . -name "*.icon" -type f -exec rm -f {} +
          echo "common --incompatible_disallow_empty_glob=false" >> .bazelrc

        - name: Fix Info.plist CFBundleIcons
        run: |
          python3 -c '
          import plistlib, os
          for root, dirs, files in os.walk("."):
              for file in files:
                  if file.startswith("Info") and file.endswith(".plist"):
                      path = os.path.join(root, file)
                      try:
                          with open(path, "rb") as f:
                              p = plistlib.load(f)
                          if isinstance(p, dict):
                              modified = False
                              if "CFBundleIcons" not in p:
                                  p["CFBundleIcons"] = {"CFBundlePrimaryIcon": {"CFBundleIconFiles": ["AppIcon"]}}
                                  modified = True
                              if "CFBundleAlternateIcons" not in p["CFBundleIcons"]:
                                  p["CFBundleIcons"]["CFBundleAlternateIcons"] = {}
                                  modified = True
                              if modified:
                                  with open(path, "wb") as f:
                                      plistlib.dump(p, f, fmt=plistlib.FMT_XML)
                      except Exception as e:
                          pass
          '
      
      - name: Generate Project Files
        run: python3 build-system/Make/Make.py generateProject --configurationPath build-system/appstore-configuration.json --disableProvisioningProfiles --disableExtensions --xcodeManagedCodesigning

      - name: Build Telegram (Unsigned)
        run: |
          xcodebuild -project Telegram/Telegram.xcodeproj -scheme Telegram -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CONFIGURATION_BUILD_DIR=${PWD}/build build

      - name: Package to IPA
        run: |
          # تحويل التطبيق الخام إلى صيغة IPA ليقبله الآيفون
          mkdir -p Payload
          mv build/Telegram.app Payload/
          zip -r Telegram-NoSearch.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-Modified-IPA
          path: Telegram-NoSearch.ipa
